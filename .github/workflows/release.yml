name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test
      - run: zig build -Doptimize=ReleaseSmall
      - name: Package installer
        shell: pwsh
        run: |
          Copy-Item zig-out\bin\zmd-setup.exe zmd-setup-windows-x86_64.exe
          $hash = (Get-FileHash zmd-setup-windows-x86_64.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  zmd-setup-windows-x86_64.exe" | Out-File -Encoding ascii zmd-setup-windows-x86_64.exe.sha256
      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (gh release view $tag *> $null) {
            gh release upload $tag zmd-setup-windows-x86_64.exe zmd-setup-windows-x86_64.exe.sha256 --clobber
          } else {
            gh release create $tag zmd-setup-windows-x86_64.exe zmd-setup-windows-x86_64.exe.sha256 --title $tag --generate-notes
          }
