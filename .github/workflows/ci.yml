name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Zig ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig version
      - run: zig build test
      - run: zig build -Doptimize=ReleaseSmall
      - run: zig build -Dwindows-console=true -Doptimize=ReleaseSmall
      - if: runner.os == 'Windows'
        run: .\zig-out\bin\zmd.exe --dump test\fixtures\sample.md
      - if: runner.os != 'Windows'
        run: ./zig-out/bin/zmd --dump test/fixtures/sample.md
